<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Responder PQRS | ADMIN</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/global-layout.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            color: #bdc3c7;
            font-weight: 500;
        }

        .form-control {
            width: 100%;
            padding: 12px;
            background: #2c3e50;
            border: 1px solid #34495e;
            border-radius: 6px;
            color: white;
            font-size: 1rem;
        }

        .form-control:read-only {
            background: #253342;
            color: #95a5a6;
            cursor: not-allowed;
        }

        .btn-enviar {
            background: #2ecc71;
            color: white;
            padding: 12px 25px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
            transition: background 0.3s;
        }

        .btn-enviar:hover {
            background: #27ae60;
        }

        .mensaje-usuario {
            background: #34495e;
            padding: 15px;
            border-radius: 6px;
            border-left: 4px solid #e67e22;
            margin-bottom: 20px;
            color: #ecf0f1;
        }
    </style>
</head>

<body>

    {% include 'componentes/navbar.html' %}

    <div class="dashboard-container">
        <!-- Sidebar -->
        {% include 'componentes/sidebar.html' %}

        <!-- Contenido -->
        <main class="dashboard-main">
            <div class="card" style="max-width: 800px; margin: 0 auto;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                    <h2><i class="fas fa-reply" style="margin-right: 10px;"></i> Responder PQRS</h2>
                    <a href="{{ url_for('pqrs.admin_pqrs_list') }}" style="color: #bdc3c7; text-decoration: none;"><i class="fas fa-arrow-left"></i> Volver</a>
                </div>

                <div class="mensaje-usuario">
                    <div style="font-size: 0.9rem; color: #bdc3c7; margin-bottom: 5px;"> Mensaje del usuario (<span>{{ pqrs.nombre }}</span>):</div>
                    <p style="margin: 0; font-style: italic;">{{ pqrs.mensaje }}</p>
                </div>

                <form action="{{ url_for('pqrs.responder_pqrs', id=pqrs.id_pqrs) }}" method="POST">
                    <input type="hidden" name="id" value="{{ pqrs.id_pqrs }}">
                    <div class="form-group">
                        <label class="form-label">Correo de contacto</label>
                        <input type="text" class="form-control" value="{{ pqrs.correo }}" readonly>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Respuesta</label>
                        <textarea name="respuesta" class="form-control" rows="6" placeholder="Escribe tu respuesta aquí..." required></textarea>
                    </div>

                    <div style="text-align: right;">
                        <button type="submit" class="btn-enviar"><i class="fas fa-paper-plane"></i> Enviar Respuesta</button>
                    </div>
                </form>
            </div>
        </main>
    </div>

</body>

</html>
