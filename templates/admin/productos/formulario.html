<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Producto</title>
    <!-- CSS Global -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/global-layout.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- CSS Productos -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/admin-productos.css') }}">
</head>

<body>

    <div th:insert="~{componentes/navbar::navbar_no_user}"></div>

    <div class="dashboard-container">
        <!-- Sidebar -->
        <div th:replace="~{componentes/sidebar :: sidebar}"></div>

        <!-- Contenido -->
        <main class="dashboard-main">
            <div class="card" style="max-width: 800px; margin: 0 auto;">
                <h2 style="margin-bottom: 30px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 15px;">
                    <i class="fas fa-edit" style="margin-right: 10px; color: #1a4fff;"></i>
                    <span
                        >{{ producto.idProducto != null ? 'Editar Producto' : 'Agregando Nuevo Producto' }}<>Producto</span>
                </h2>

                <form action="/admin/productos/guardar"  method="post"
                    enctype="multipart/form-data">
                    <input type="hidden"  />

                    <div class="form-group">
                        <label>Nombre del Producto *</label>
                        <input type="text"  class="form-control" required
                            placeholder="Ej. Orquídea Phalaenopsis">
                    </div>

                    <div class="form-group">
                        <label>Descripción</label>
                        <textarea  class="form-control" rows="4"
                            placeholder="Describe los detalles del producto..."></textarea>
                    </div>

                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                        <div class="form-group">
                            <label>Precio ($) *</label>
                            <input type="number" step="0.01"  class="form-control" required
                                placeholder="0.00">
                        </div>

                        <div class="form-group">
                            <label>Categoría</label>
                            <select name="idCategoriaSeleccionada" class="form-control1">
                                <option value="">-- Seleccionar --</option>
                                <option th:each="cat : ${categorias}" th:value="${cat.idCategoria}"
                                    >{{ cat.nombre }}<
                                    th:selected="${producto.categoria != null and producto.categoria.idCategoria == cat.idCategoria}">
                                </option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label>Stock *</label>
                            <input type="number"  class="form-control" required min="0"
                                placeholder="0">
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Imagen (Archivo)</label>
                        <input type="file" name="imagenFile" class="form-control" accept="image/*">
                        <!-- Preserve existing image filename when editing -->
                        <input type="hidden" name="imagenExistente" th:value="${producto.imagen}"
                            th:if="${producto.imagen != null}" />
                    </div>

                    <div class="form-actions"
                        style="margin-top: 40px; text-align: right; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 20px;">
                        <a href="/admin/productos" class="btn-cancelar">Cancelar</a>
                        <button type="submit" class="btn-guardar">
                            <i class="fas fa-save" style="margin-right: 5px;"></i> Guardar Producto
                        </button>
                    </div>
                </form>
            </div>
        </main>
    </div>

</body>

</html>
