<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Iniciar Sesión</title>


    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">

</head>

<body>


    {% include 'componentes/navbar.html' %}


    <div class="login-content-wrapper">

        <div class="login-container">


            <div class="left-side"></div>


            <div class="right-side">
                <div class="form-container">

                    <h2><i class="fa-solid fa-user-shield"></i> Iniciar Sesión</h2>

                    {% with messages = get_flashed_messages(with_categories=true) %}
                        {% if messages %}
                            {% for category, message in messages %}
                                <div class="alert alert-{{ 'danger' if category == 'error' else category }}">
                                    <ul>
                                        <li>{{ message }}</li>
                                    </ul>
                                </div>
                            {% endfor %}
                        {% endif %}
                    {% endwith %}

                    <form method="POST" action="/login">

                        <label for="username">Correo</label>
                        <input type="email" id="username" name="username" placeholder="Tu correo" required>

                        <label for="password">Contraseña</label>
                        <div class="password-container">
                            <input type="password" id="password" name="password" placeholder="Tu contraseña" required>
                            <i class="fas fa-eye" id="togglePasswordLogin"></i>
                        </div>

                        <button type="submit">Ingresar</button>

                        <p class="extra-link">
                            <a href="/recuperar-password">¿Olvidaste tu contraseña?</a>
                        </p>
                        <p class="extra-link">
                            ¿No tienes cuenta? <a href="/registro">Regístrate aquí</a>
                        </p>
                    </form>

                </div>
            </div>

        </div>
    </div>

    <script>
        // Toggle password visibility
        const togglePasswordLogin = document.getElementById('togglePasswordLogin');
        const passwordInputLogin = document.getElementById('password');

        if (togglePasswordLogin && passwordInputLogin) {
            togglePasswordLogin.addEventListener('click', function () {
                // Toggle the type attribute
                const type = passwordInputLogin.getAttribute('type') === 'password' ? 'text' : 'password';
                passwordInputLogin.setAttribute('type', type);

                // Toggle the eye icon
                this.classList.toggle('fa-eye');
                this.classList.toggle('fa-eye-slash');
            });
        }
    </script>

</body>

</html>
